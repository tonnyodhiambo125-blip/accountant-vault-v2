name: Vault Automation Sync

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Vault Engine
        run: python scripts/vault_engine.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Vault-Bot"
          git config --global user.email "bot@vault.com"
          git add automations.json
          git commit -m "Auto-update vault data" || echo "No changes to commit"
          git push