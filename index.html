<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountant Vault Pro v2</title>
    <style>
        :root { --primary: #0747a6; --accent: #ffd700; --bg: #f4f7f9; --text: #333; --success: #36b37e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        
        /* 1. LOCK SCREEN STYLES */
        #lock-screen { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .lock-box { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 320px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .lock-box input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; text-align: center; font-size: 24px; box-sizing: border-box; }

        /* 2. DASHBOARD LAYOUT */
        header { background: var(--primary); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--accent); }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        
        /* CLIENT FOLDERS */
        .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .client-card { background: white; padding: 25px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #ddd; transition: 0.2s; position: relative; }
        .client-card:hover { transform: translateY(-3px); border-color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .delete-btn { position: absolute; top: 8px; right: 10px; color: #ccc; cursor: pointer; font-size: 18px; }
        .delete-btn:hover { color: #ff5630; }

        /* AGENCY PORTAL CARDS (Optimized for 15 items) */
        .agency-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-top: 20px; }
        .agency-card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #eee; display: flex; flex-direction: column; justify-content: space-between; }
        .agency-card strong { font-size: 14px; color: var(--primary); }
        .agency-card small { color: #888; font-size: 11px; margin: 4px 0; }

        /* CREDENTIAL MODAL */
        #cred-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 20000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 340px; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        /* BUTTONS */
        .btn-blue { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-outline { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 8px; border-radius: 6px; cursor: pointer; margin-top: 5px; width: 100%; font-size: 12px; }
        .btn-outline:hover { background: #f0f7ff; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-box">
            <h2 style="margin:0;">Secure Vault</h2>
            <p style="color:#666; font-size:14px;">Authorized Accountant Access</p>
            <input type="password" id="pin-input" placeholder="••••" maxlength="4">
            <button class="btn-blue" onclick="attemptUnlock()">Unlock Dashboard</button>
        </div>
    </div>

    <div id="main-app" style="display:none">
        <header>
            <h3 style="margin:0;">🇰🇪 Professional Vault</h3>
            <button onclick="logout()" style="background:none; border:1px solid white; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">Logout</button>
        </header>

        <div class="container">
            <div id="home-view">
                <div style="display:flex; gap:10px; margin-bottom:25px;">
                    <input type="text" id="newClientName" placeholder="Enter Client or Company Name..." style="flex:1; padding:12px; border-radius:10px; border:1px solid #ddd;">
                    <button onclick="addClient()" class="btn-blue" style="width:140px;">+ New Folder</button>
                </div>
                <div class="client-grid" id="clientGrid"></div>
            </div>

            <div id="folder-view" style="display:none">
                <button onclick="goHome()" style="background:#eee; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-bottom:15px;">⬅ Back to Client List</button>
                <h2 id="activeClientName" style="color:var(--primary); margin:0;"></h2>
                <div class="agency-list" id="agencyGrid"></div>
            </div>
        </div>
    </div>

    <div id="cred-modal">
        <div class="modal-content">
            <h4 id="modal-title" style="margin:0;">Edit Credentials</h4>
            <input type="text" id="edit-user" placeholder="Username / ID Number">
            <input type="password" id="edit-pass" placeholder="Password / PIN">
            <div style="display:flex; gap:10px;">
                <button class="btn-blue" onclick="saveCreds()">Save to Vault</button>
                <button onclick="closeModal()" style="border:none; background:none; cursor:pointer; width:100%;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // 1. CONFIGURATION: ALL PORTALS DEFINED HERE
        const MASTER_PIN = "1234";
        const agencyConfig = [
            { id: 'itax', name: 'KRA iTax Portal', url: 'https://itax.kra.go.ke/' },
            { id: 'egms', name: 'KRA EGMS', url: 'https://egms.kra.go.ke/' },
            { id: 'etims', name: 'KRA eTIMS', url: 'https://etims.kra.go.ke/' },
            { id: 'nssf', name: 'NSSF Portal', url: 'https://selfservice.nssf.or.ke/' },
            { id: 'shif', name: 'SHIF (SHA) Portal', url: 'https://sha.go.ke/' },
            { id: 'nrs', name: 'NRS Portal', url: 'https://nrs.nairobi.go.ke/' },
            { id: 'agpo', name: 'AGPO Portal', url: 'https://agpo.go.ke/' },
            { id: 'egp', name: 'EGP Portal', url: 'http://www.tenders.go.ke/' },
            { id: 'ifmis', name: 'IFMIS Kenya', url: 'https://supplier.treasury.go.ke/' },
            { id: 'ecitizen', name: 'e-Citizen', url: 'https://accounts.ecitizen.go.ke/' },
            { id: 'tourism', name: 'Tourism Levy', url: 'https://www.tourismauthority.go.ke/' },
            { id: 'email', name: 'Business Email', url: 'https://mail.google.com/' },
            { id: 'ardhi', name: 'Ardhi Sasa', url: 'https://ardhisasa.lands.go.ke/' },
            { id: 'qbo', name: 'QuickBooks Online', url: 'https://qbo.intuit.com/' }
        ];

        // 2. DATA MANAGEMENT (LocalStorage)
        let clients = JSON.parse(localStorage.getItem('vault_v2_data')) || [];
        let activeClientId = null;
        let activeAgencyId = null;

        // 3. AUTHENTICATION LOGIC
        function init() {
            if (localStorage.getItem('vault_v2_auth') === 'true') {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                renderHome();
            }
        }

        function attemptUnlock() {
            if (document.getElementById('pin-input').value === MASTER_PIN) {
                localStorage.setItem('vault_v2_auth', 'true');
                init();
            } else { 
                alert("Incorrect PIN"); 
                document.getElementById('pin-input').value = "";
            }
        }

        function logout() {
            localStorage.removeItem('vault_v2_auth');
            location.reload();
        }

        // 4. CLIENT FOLDER ACTIONS
        function addClient() {
            const name = document.getElementById('newClientName').value;
            if (!name) return;
            clients.push({ id: Date.now(), name, creds: {} });
            saveAndRender();
            document.getElementById('newClientName').value = '';
        }

        function renderHome() {
            const grid = document.getElementById('clientGrid');
            grid.innerHTML = clients.map(c => `
                <div class="client-card" onclick="openFolder(${c.id})">
                    <span class="delete-btn" onclick="event.stopPropagation(); deleteClient(${c.id})">×</span>
                    <div style="font-size:40px;">📁</div>
                    <strong>${c.name}</strong>
                </div>
            `).join('');
        }

        function deleteClient(id) {
            if (confirm("Permanently delete this client folder?")) {
                clients = clients.filter(c => c.id !== id);
                saveAndRender();
            }
        }

        function openFolder(id) {
            activeClientId = id;
            const client = clients.find(c => c.id === id);
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('folder-view').style.display = 'block';
            document.getElementById('activeClientName').innerText = client.name;
            
            const grid = document.getElementById('agencyGrid');
            grid.innerHTML = agencyConfig.map(a => {
                const data = client.creds[a.id] || { u: 'Not Set', p: '' };
                return `
                    <div class="agency-card">
                        <div>
                            <strong>${a.name}</strong><br>
                            <small>User ID: ${data.u}</small>
                        </div>
                        <div>
                            <button class="btn-outline" onclick="launch('${a.id}')">Launch & Copy PIN</button>
                            <button class="btn-outline" style="border-color:#ccc; color:#666" onclick="openModal('${a.id}')">Edit Login</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 5. CREDENTIAL ACTIONS
        function openModal(agencyId) {
            activeAgencyId = agencyId;
            const client = clients.find(c => c.id === activeClientId);
            const data = client.creds[agencyId] || { u: '', p: '' };
            document.getElementById('modal-title').innerText = "Edit " + agencyId.toUpperCase();
            document.getElementById('edit-user').value = data.u;
            document.getElementById('edit-pass').value = data.p;
            document.getElementById('cred-modal').style.display = 'flex';
        }

        function saveCreds() {
            const client = clients.find(c => c.id === activeClientId);
            client.creds[activeAgencyId] = {
                u: document.getElementById('edit-user').value,
                p: document.getElementById('edit-pass').value
            };
            saveData();
            closeModal();
            openFolder(activeClientId);
        }

        function launch(agencyId) {
            const client = clients.find(c => c.id === activeClientId);
            const agency = agencyConfig.find(a => a.id === agencyId);
            const data = client.creds[agencyId];
            if (!data || !data.p) return alert("Please save a password/PIN for this agency first!");
            
            navigator.clipboard.writeText(data.p).then(() => {
                alert("PIN copied to clipboard! Redirecting to " + agency.name);
                window.open(agency.url, '_blank');
            });
        }

        function goHome() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('folder-view').style.display = 'none';
        }

        function closeModal() { document.getElementById('cred-modal').style.display = 'none'; }
        function saveData() { localStorage.setItem('vault_v2_data', JSON.stringify(clients)); }
        function saveAndRender() { saveData(); renderHome(); }

        init();
    </script>
</body>
</html>
