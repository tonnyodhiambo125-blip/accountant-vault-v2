<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountant Vault v2</title>
    <style>
        :root { --primary: #0747a6; --accent: #ffd700; --bg: #f4f7f9; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        
        /* Lock Screen */
        #lock-screen { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .lock-box { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 320px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .lock-box input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; text-align: center; font-size: 24px; box-sizing: border-box; }

        /* Header & Navigation */
        header { background: var(--primary); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--accent); }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        
        /* Python Automation Banner */
        #python-banner { background: #e3f2fd; padding: 15px; border-radius: 10px; margin-bottom: 25px; border-left: 5px solid var(--primary); display: none; font-size: 14px; }
        
        /* Client Grid */
        .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .client-card { background: white; padding: 30px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #ddd; transition: 0.3s; position: relative; }
        .client-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        
        /* Folder View (Agencies) */
        .agency-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .agency-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; text-align: center; }

        /* Buttons */
        .btn-blue { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-outline { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 8px; border-radius: 6px; cursor: pointer; margin-top: 8px; width: 100%; font-size: 12px; }
        .logout-btn { background: transparent; border: 1px solid white; color: white; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-box">
            <h2 style="margin:0;">Secure Vault</h2>
            <p style="color:#666; font-size:14px;">Authorized Personnel Only</p>
            <input type="password" id="pin-input" placeholder="••••" maxlength="4">
            <button class="btn-blue" onclick="attemptUnlock()">Unlock Vault</button>
        </div>
    </div>

    <div id="main-app" style="display:none">
        <header>
            <div>
                <h2 style="margin:0;">Accountant Vault v2</h2>
                <small id="sync-status" style="opacity:0.8;">Checking Python Sync...</small>
            </div>
            <button class="logout-btn" onclick="terminateSession()">Secure Logout</button>
        </header>

        <div class="container">
            <div id="python-banner"></div>

            <div id="home-view">
                <div style="display:flex; gap:10px; margin-bottom:30px;">
                    <input type="text" id="newClientName" placeholder="Client or Company Name..." style="flex:1; padding:15px; border-radius:10px; border:1px solid #ddd;">
                    <button onclick="createNewFolder()" style="width:150px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">+ Add Folder</button>
                </div>
                <div class="client-grid" id="clientGrid"></div>
            </div>

            <div id="folder-view" style="display:none">
                <button onclick="goHome()" style="background:#666; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-bottom:15px;">⬅ Back to Clients</button>
                <h2 id="activeFolderName" style="color:var(--primary); margin:0;"></h2>
                <div class="agency-list" id="agencyGrid"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION & STATE ---
        const MASTER_PIN = "1234";
        let clients = JSON.parse(localStorage.getItem('v2_clients')) || [];
        let currentClientId = null;
        const agencyConfig = [
            { id: 'kra', name: 'KRA iTax', url: 'https://itax.kra.go.ke/' },
            { id: 'ecitizen', name: 'eCitizen', url: 'https://accounts.ecitizen.go.ke/' },
            { id: 'ntsa', name: 'NTSA Portal', url: 'https://timsvirl.ntsa.go.ke/' }
        ];

        // --- 2. THE "IRONCLAD" LOGIN CHECK ---
        // This runs immediately to check if you are already logged in
        function checkAuthStatus() {
            const isAuth = localStorage.getItem('v2_authenticated');
            if (isAuth === 'true') {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                renderClientGrid();
                loadPythonData();
            }
        }
        document.addEventListener('DOMContentLoaded', checkAuthStatus);

        function attemptUnlock() {
            const pin = document.getElementById('pin-input').value;
            if (pin === MASTER_PIN) {
                localStorage.setItem('v2_authenticated', 'true');
                checkAuthStatus(); // Instantly switch views
            } else {
                alert("Invalid PIN");
                document.getElementById('pin-input').value = "";
            }
        }

        function terminateSession() {
            localStorage.removeItem('v2_authenticated');
            location.reload();
        }

        // --- 3. PYTHON AUTOMATION SYNC ---
        async function loadPythonData() {
            try {
                // Fetch the JSON created by your Python script
                const response = await fetch(`./automations.json?nocache=${Date.now()}`);
                const data = await response.json();
                
                document.getElementById('sync-status').innerText = "Last Sync: " + data.last_sync;
                
                const banner = document.getElementById('python-banner');
                banner.style.display = 'block';
                banner.innerHTML = `<strong>📢 TAX CALENDAR:</strong> ` + 
                    data.tax_deadlines.map(t => `${t.agency}: ${t.deadline}`).join(' | ');
            } catch (e) {
                console.log("Waiting for GitHub Action to generate first automations.json...");
            }
        }

        // --- 4. CLIENT FOLDER LOGIC ---
        function createNewFolder() {
            const name = document.getElementById('newClientName').value;
            if (!name) return;
            const newClient = { id: Date.now(), name: name, credentials: {} };
            clients.push(newClient);
            syncStorage();
            renderClientGrid();
            document.getElementById('newClientName').value = '';
        }

        function renderClientGrid() {
            const grid = document.getElementById('clientGrid');
            grid.innerHTML = clients.map(c => `
                <div class="client-card" onclick="openClientFolder(${c.id})">
                    <div style="font-size:50px">📁</div>
                    <strong>${c.name}</strong>
                </div>
            `).join('');
        }

        function openClientFolder(id) {
            currentClientId = id;
            const client = clients.find(c => c.id === id);
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('folder-view').style.display = 'block';
            document.getElementById('activeFolderName').innerText = client.name;
            
            const agencyGrid = document.getElementById('agencyGrid');
            agencyGrid.innerHTML = agencyConfig.map(a => `
                <div class="agency-card">
                    <strong>${a.name}</strong>
                    <button class="btn-outline" onclick="window.open('${a.url}', '_blank')">Open Portal</button>
                </div>
            `).join('');
        }

        function goHome() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('folder-view').style.display = 'none';
        }

        function syncStorage() {
            localStorage.setItem('v2_clients', JSON.stringify(clients));
        }
    </script>
</body>
</html>
